experiment:
  name: efficientnet_b0_strong_aug
  seed: 42
output:
  root_dir: outputs
  metadata_dir: metadata
data:
  data_dir: .
  train_dir: train
  test_dir: test
  labels_file: labels.csv
  sample_submission_file: sample_submission.csv
  split_file: metadata/train_val_split_seed42_val20.csv
  val_ratio: 0.2
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  image_size: 224
augmentation:
  train:
    random_resized_crop_scale:
    - 0.65
    - 1.0
    random_resized_crop_ratio:
    - 0.7
    - 1.4
    horizontal_flip_prob: 0.5
    rotation_degrees: 15
    color_jitter:
      brightness: 0.25
      contrast: 0.25
      saturation: 0.2
      hue: 0.05
    random_grayscale_prob: 0.05
    perspective_prob: 0.15
    perspective_distortion_scale: 0.2
    gaussian_blur_prob: 0.1
    use_randaugment: true
    randaugment_num_ops: 2
    randaugment_magnitude: 9
    use_trivial_augment: false
    random_erasing_prob: 0.25
model:
  name: efficientnet_b0
  weights: DEFAULT
training:
  device: auto
  epochs: 18
  batch_size: 48
  freeze_backbone_epochs: 1
  amp: true
  grad_clip_norm: 1.0
  early_stopping_patience: 6
  monitor: val_loss
  criterion:
    name: cross_entropy
    label_smoothing: 0.1
  optimizer:
    name: adamw
    lr: 0.00025
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 1.0e-06
    step_size: 5
    gamma: 0.1
    patience: 2
    factor: 0.5
inference:
  batch_size: 64
  num_workers: 4
  probability_clip: 1.0e-08
