experiment:
  name: vit_b16_finetune
  seed: 42

output:
  root_dir: outputs
  metadata_dir: metadata

data:
  data_dir: .
  train_dir: train
  test_dir: test
  labels_file: labels.csv
  sample_submission_file: sample_submission.csv
  split_file: metadata/train_val_split_seed42_val20.csv
  val_ratio: 0.2
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  image_size: 224

augmentation:
  train:
    random_resized_crop_scale: [0.8, 1.0]
    random_resized_crop_ratio: [0.75, 1.3333333333]
    horizontal_flip_prob: 0.5
    rotation_degrees: 8
    color_jitter:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.1
      hue: 0.02
    random_grayscale_prob: 0.0
    perspective_prob: 0.0
    perspective_distortion_scale: 0.2
    gaussian_blur_prob: 0.0
    use_randaugment: false
    randaugment_num_ops: 2
    randaugment_magnitude: 9
    use_trivial_augment: true
    random_erasing_prob: 0.1

model:
  name: vit_b_16
  weights: DEFAULT

training:
  device: auto
  epochs: 12
  batch_size: 16
  freeze_backbone_epochs: 0
  amp: true
  grad_clip_norm: 1.0
  early_stopping_patience: 4
  monitor: val_loss
  criterion:
    name: cross_entropy
    label_smoothing: 0.1
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001

inference:
  batch_size: 32
  num_workers: 4
  probability_clip: 0.00000001
